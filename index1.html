<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-gray-100 p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full text-center">
        <i class="ri-shield-check-line text-6xl text-red-500 mb-4"></i>
        <h1 class="text-2xl font-bold mb-2">Confirm Logout</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to logout?</p>

        <div class="flex gap-3 justify-center">
            <!-- Cancel button -->
            <button onclick="window.history.back()" class="px-4 py-2 bg-gray-200 rounded-lg font-bold hover:bg-gray-300 transition-colors">
                Cancel
            </button>
            <!-- Submit button -->
            <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700 transition-colors">
                Logout & Go
            </button>
        </div>
    </div>

</body>
</html>
